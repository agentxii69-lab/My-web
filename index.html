<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My GitHub Pages Test</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #ffffff;
      text-align: center;
    }
    .card {
      padding: 3rem 2.5rem;
      border-radius: 16px;
      background: #16213e;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    p {
      color: #a0a0c0;
      margin: 0;
    }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      background: #0f3460;
      color: #53d8fb;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎉 It's live!</h1>
    <p>This page is being served from GitHub Pages.</p>
    <span class="badge">Deployed successfully</span>
  </div>
</body>
</html>
